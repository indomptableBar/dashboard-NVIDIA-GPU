<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NVIDIA GPU Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.37);
            --text-primary: rgba(255, 255, 255, 0.95);
            --text-secondary: rgba(255, 255, 255, 0.7);
            --accent-green: #30d158;
            --accent-orange: #ff9f0a;
            --accent-red: #ff453a;
            --accent-blue: #0a84ff;
            --accent-purple: #bf5af2;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 25%, #0f3460 50%, #533483 75%, #1a1a2e 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: var(--text-primary);
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 119, 198, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(120, 219, 255, 0.15) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.7) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        header p {
            font-size: 17px;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .status-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: pulse 2s ease-in-out infinite;
        }

        .status-dot.error {
            background: var(--accent-red);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .summary-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .summary-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            box-shadow: var(--glass-shadow);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .summary-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .summary-card .label {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .summary-card .value {
            font-size: 32px;
            font-weight: 600;
        }

        .summary-card .unit {
            font-size: 16px;
            font-weight: 400;
            color: var(--text-secondary);
        }

        .gpu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
            gap: 24px;
        }

        .gpu-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 28px;
            box-shadow: var(--glass-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .gpu-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
        }

        .gpu-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gpu-header h2 {
            font-size: 22px;
            font-weight: 600;
        }

        .gpu-header .gpu-id {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .gpu-badge {
            background: rgba(48, 209, 88, 0.2);
            color: var(--accent-green);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .metric {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 16px;
        }

        .metric .metric-label {
            font-size: 12px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .metric .metric-value {
            font-size: 24px;
            font-weight: 600;
        }

        .metric .metric-bar {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }

        .metric .metric-bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s ease;
        }

        .metric-bar-fill.green { background: linear-gradient(90deg, var(--accent-green), #34c759); }
        .metric-bar-fill.orange { background: linear-gradient(90deg, var(--accent-orange), #ff9500); }
        .metric-bar-fill.red { background: linear-gradient(90deg, var(--accent-red), #ff3b30); }
        .metric-bar-fill.blue { background: linear-gradient(90deg, var(--accent-blue), #5ac8fa); }
        .metric-bar-fill.purple { background: linear-gradient(90deg, var(--accent-purple), #af52de); }

        .processes-section {
            margin-top: 20px;
        }

        .processes-section h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }

        .process-list {
            max-height: 150px;
            overflow-y: auto;
        }

        .process-list::-webkit-scrollbar {
            width: 4px;
        }

        .process-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .process-list::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        .process-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .process-item .pid {
            color: var(--accent-blue);
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .process-item .name {
            flex: 1;
            margin-left: 12px;
            color: var(--text-primary);
        }

        .process-item .mem {
            color: var(--text-secondary);
            font-family: 'SF Mono', 'Fira Code', monospace;
        }

        .no-processes {
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
            padding: 20px;
        }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }

        .error-state h2 {
            font-size: 24px;
            margin-bottom: 12px;
            color: var(--accent-red);
        }

        .error-state p {
            color: var(--text-secondary);
        }

        @media (max-width: 768px) {
            .container {
                padding: 24px 16px;
            }

            header h1 {
                font-size: 32px;
            }

            .gpu-grid {
                grid-template-columns: 1fr;
            }

            .metrics-grid {
                grid-template-columns: 1fr;
            }

            .summary-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>NVIDIA GPU Dashboard</h1>
            <p>Real-time monitoring of all GPU resources</p>
            <div class="status-bar">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Connecting...</span>
                <span id="lastUpdate"></span>
            </div>
        </header>

        <div id="summarySection" class="summary-grid"></div>
        <div id="gpuContainer" class="gpu-grid"></div>
    </div>

    <script>
        const API_URL = '/api/gpu';
        const REFRESH_INTERVAL = 2000;

        function getBarColor(value) {
            if (value < 50) return 'green';
            if (value < 80) return 'orange';
            return 'red';
        }

        function formatMemory(mib) {
            if (mib >= 1024) {
                return `${(mib / 1024).toFixed(1)} GB`;
            }
            return `${Math.round(mib)} MB`;
        }

        function renderSummary(data) {
            const summary = document.getElementById('summarySection');
            if (!data.gpus || data.gpus.length === 0) {
                summary.innerHTML = '';
                return;
            }

            const totalGpus = data.gpus.length;
            const avgUtil = Math.round(data.gpus.reduce((sum, gpu) => sum + gpu.utilization.gpu, 0) / totalGpus);
            const totalMemUsed = data.gpus.reduce((sum, gpu) => sum + gpu.memory.used, 0);
            const totalMem = data.gpus.reduce((sum, gpu) => sum + gpu.memory.total, 0);
            const avgTemp = Math.round(data.gpus.reduce((sum, gpu) => sum + gpu.temperature.value, 0) / totalGpus);
            const totalPower = data.gpus.reduce((sum, gpu) => sum + gpu.power.current, 0).toFixed(0);

            summary.innerHTML = `
                <div class="summary-card">
                    <div class="label">GPUs</div>
                    <div class="value">${totalGpus}</div>
                </div>
                <div class="summary-card">
                    <div class="label">Avg Utilization</div>
                    <div class="value">${avgUtil}<span class="unit">%</span></div>
                </div>
                <div class="summary-card">
                    <div class="label">Memory Used</div>
                    <div class="value">${formatMemory(totalMemUsed)}</div>
                    <div class="unit">of ${formatMemory(totalMem)}</div>
                </div>
                <div class="summary-card">
                    <div class="label">Avg Temperature</div>
                    <div class="value">${avgTemp}<span class="unit">°C</span></div>
                </div>
                <div class="summary-card">
                    <div class="label">Total Power</div>
                    <div class="value">${totalPower}<span class="unit">W</span></div>
                </div>
            `;
        }

        function renderGPUs(data) {
            const container = document.getElementById('gpuContainer');

            if (data.error || !data.gpus || data.gpus.length === 0) {
                container.innerHTML = `
                    <div class="error-state">
                        <h2>No GPU Data Available</h2>
                        <p>${data.error || 'nvidia-smi is not accessible or no GPUs detected.'}</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = data.gpus.map(gpu => {
                const memPercent = ((gpu.memory.used / gpu.memory.total) * 100).toFixed(0);
                const powerPercent = gpu.power.limit > 0 ? ((gpu.power.current / gpu.power.limit) * 100).toFixed(0) : 0;

                const processesHtml = gpu.processes.length > 0
                    ? gpu.processes.map(p => `
                        <div class="process-item">
                            <span class="pid">${p.pid}</span>
                            <span class="name">${p.name}</span>
                            <span class="mem">${p.memory}</span>
                        </div>
                    `).join('')
                    : '<div class="no-processes">No active processes</div>';

                return `
                    <div class="gpu-card">
                        <div class="gpu-header">
                            <div>
                                <h2>${gpu.name}</h2>
                                <div class="gpu-id">${gpu.uuid}</div>
                            </div>
                            <span class="gpu-badge">GPU ${gpu.id}</span>
                        </div>

                        <div class="metrics-grid">
                            <div class="metric">
                                <div class="metric-label">GPU Utilization</div>
                                <div class="metric-value">${gpu.utilization.gpu}%</div>
                                <div class="metric-bar">
                                    <div class="metric-bar-fill ${getBarColor(gpu.utilization.gpu)}" style="width: ${gpu.utilization.gpu}%"></div>
                                </div>
                            </div>

                            <div class="metric">
                                <div class="metric-label">Memory Usage</div>
                                <div class="metric-value">${formatMemory(gpu.memory.used)}</div>
                                <div class="metric-bar">
                                    <div class="metric-bar-fill ${getBarColor(memPercent)}" style="width: ${memPercent}%"></div>
                                </div>
                            </div>

                            <div class="metric">
                                <div class="metric-label">Temperature</div>
                                <div class="metric-value">${gpu.temperature.value}°C</div>
                                <div class="metric-bar">
                                    <div class="metric-bar-fill ${getBarColor(gpu.temperature.value)}" style="width: ${gpu.temperature.value}%"></div>
                                </div>
                            </div>

                            <div class="metric">
                                <div class="metric-label">Power Draw</div>
                                <div class="metric-value">${gpu.power.current}W</div>
                                <div class="metric-bar">
                                    <div class="metric-bar-fill purple" style="width: ${powerPercent}%"></div>
                                </div>
                            </div>

                            <div class="metric">
                                <div class="metric-label">Memory Util</div>
                                <div class="metric-value">${gpu.utilization.memory}%</div>
                                <div class="metric-bar">
                                    <div class="metric-bar-fill blue" style="width: ${gpu.utilization.memory}%"></div>
                                </div>
                            </div>

                            <div class="metric">
                                <div class="metric-label">Fan Speed</div>
                                <div class="metric-value">${gpu.fan_speed}%</div>
                                <div class="metric-bar">
                                    <div class="metric-bar-fill orange" style="width: ${gpu.fan_speed}%"></div>
                                </div>
                            </div>
                        </div>

                        <div class="processes-section">
                            <h3>Running Processes</h3>
                            <div class="process-list">
                                ${processesHtml}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();

                document.getElementById('statusDot').className = 'status-dot';
                document.getElementById('statusText').textContent = 'Live';
                document.getElementById('lastUpdate').textContent = `Updated: ${data.timestamp || 'N/A'}`;

                renderSummary(data);
                renderGPUs(data);
            } catch (error) {
                document.getElementById('statusDot').className = 'status-dot error';
                document.getElementById('statusText').textContent = 'Connection Error';
                document.getElementById('lastUpdate').textContent = '';
                renderGPUs({ error: 'Failed to connect to GPU API. Is the server running?' });
            }
        }

        fetchData();
        setInterval(fetchData, REFRESH_INTERVAL);
    </script>
</body>
</html>
